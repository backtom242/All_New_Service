function SignaturePad({label,height=150}){
const canvasRef=useRef(null);
const drawingRef=useRef(false);
const lastRef=useRef({x:0,y:0});
const[hasInk,setHasInk]=useState(false);
const getPos=(e)=>{
const canvas=canvasRef.current;const rect=canvas.getBoundingClientRect();
const t=e.touches&&e.touches[0]?e.touches[0]:e;
return {x:(t.clientX-rect.left)*(canvas.width/rect.width),y:(t.clientY-rect.top)*(canvas.height/rect.height)};
};
const start=(e)=>{e.preventDefault();drawingRef.current=true;lastRef.current=getPos(e);};
const move=(e)=>{
if(!drawingRef.current)return;e.preventDefault();
const canvas=canvasRef.current;const ctx=canvas.getContext("2d");const p=getPos(e);
ctx.strokeStyle="#1F2937";ctx.lineWidth=2.6;ctx.lineCap="round";ctx.lineJoin="round";
ctx.beginPath();ctx.moveTo(lastRef.current.x,lastRef.current.y);ctx.lineTo(p.x,p.y);ctx.stroke();
lastRef.current=p;if(!hasInk)setHasInk(true);
};
const end=()=>{drawingRef.current=false;};
const clear=()=>{const canvas=canvasRef.current;const ctx=canvas.getContext("2d");ctx.clearRect(0,0,canvas.width,canvas.height);setHasInk(false);};
useEffect(()=>{const canvas=canvasRef.current;if(canvas){canvas.width=(canvas.offsetWidth||320)*2;canvas.height=height*2;}},[]);
return(<div style={{marginBottom:6}}>
<div style={{position:"relative",border:`2px solid ${hasInk?C.green:C.line}`,borderRadius:12,background:C.white,overflow:"hidden"}}>
<canvas ref={canvasRef}
style={{width:"100%",height:height,touchAction:"none",display:"block",cursor:PEN_CURSOR}}
onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
{!hasInk&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none",color:C.sub,gap:5}}>
<span style={{fontSize:26}}>✍️</span><span style={{fontSize:12}}>{label||"여기에 손으로 서명해 주세요"}</span></div>}
<div style={{position:"absolute",left:14,right:14,bottom:20,height:1,background:C.line,pointerEvents:"none"}}/>
</div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:7}}>
<span style={{fontSize:12,color:hasInk?C.green:C.sub,fontWeight:hasInk?700:400}}>{hasInk?"✓ 서명 입력됨":"미서명"}</span>
<button onClick={clear} style={{...S.gbtn,fontSize:12,padding:"6px 12px"}}>🔄 다시 그리기</button></div>
</div>);
}

const set=(k)=>(e)=>{setOkMsg(false);setF(o=>({...o,[k]:(e&&e.target)?e.target.value:e}));};
const setV=(k,v)=>{setOkMsg(false);setF(o=>({...o,[k]:v}));};

const commitFg=()=>{const v=(f.fg||"").trim();if(!v)return;setFgHist(h=>(h[0]&&h[0].name===v)?h:[{time:nowStr(),name:v},...h]);};
const doSave=()=>{
let mh=mgrHist,fh=fgHist,rh=renewHist;
const mv=(f.mgr||"").trim();if(mv&&(!mh[0]||mh[0].name!==mv)){mh=[{time:nowStr(),name:mv},...mh];setMgrHist(mh);}
const fv=(f.fg||"").trim();if(fv&&(!fh[0]||fh[0].name!==fv)){fh=[{time:nowStr(),name:fv},...fh];setFgHist(fh);}
const rv=(f.d2||"").trim();if(rv&&(!rh[0]||rh[0].date!==rv)){rh=[{time:nowStr(),date:rv},...rh];setRenewHist(rh);}
let sh=scentHist;const sv=(f.scent||"").trim();if(sv&&(!sh[0]||sh[0].name!==sv)){sh=[{time:nowStr(),name:sv},...sh];setScentHist(sh);}
const key=((f.cust||"").trim())||p||"미지정";
INSTALL_DATA[key]={f:{...f},mgrHist:mh,fgHist:fh,renewHist:rh,scentHist:sh,devRows:[...devRows]};
setOkMsg(true);setSerialWarn(null);
nav("visit",{p:key});
};

// ===== [신규] 월 예상 소비량 계산 (별도 페이지) =====
function ShipCalc({nav,params}){
const pr=params||{};
const[ps,setPs]=useState(pr.perSec!=null?String(Math.round(pr.perSec*10000)/10000):"");
const[h,setH]=useState("");const[days,setDays]=useState("");
const[spray,setSpray]=useState("");const[stop,setStop]=useState("");
const num=(v)=>{const n=parseFloat(v);return isNaN(n)?null:n;};
const P=num(ps),H=num(h),D=num(days),SP=num(spray),ST=num(stop);
const duty=(SP!=null&&ST!=null&&(SP+ST)>0)?SP/(SP+ST):1;
const est=(P!=null&&H!=null&&D!=null)?P*H*3600*duty*D:null;
const ci={...S.inp,background:C.white};
return(<div style={{display:"flex",flexDirection:"column",height:"100%"}}>
<div style={S.top}><button style={S.back} onClick={()=>NAVREF.back()}>‹</button><span style={S.h1}>월 예상 계산</span></div>
<div style={S.body}>
<div style={{...S.card,background:C.mintL,border:`1px solid ${C.mint}`,display:"flex",alignItems:"center",gap:12}}>
<span style={{width:42,height:42,borderRadius:12,background:C.white,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🧴</span>
<div style={{flex:1,minWidth:0}}><div style={{fontSize:15,fontWeight:800,color:C.mintD}}>{pr.scent||"향기 미지정"}</div>
<div style={{fontSize:11,color:C.sub,marginTop:2}}>{pr.device||"기기 미지정"}</div></div></div>
<div style={{fontSize:11.5,color:C.sub,lineHeight:1.6,margin:"2px 2px 12px"}}>향료 출고량 산정에서 넘어온 <b style={{color:C.mintD}}>초당 소비량</b>을 기준으로, 가동 조건을 입력하면 월 예상 소비량이 자동 계산됩니다.</div>
<div style={S.card}>
<div style={S.fld}><span style={S.lbl}>초당 소비량 (ml/s)</span><input value={ps} onChange={e=>setPs(e.target.value)} type="text" inputMode="decimal" style={ci} placeholder="예: 0.0025"/></div>
<div style={S.row}>
<div style={{flex:1}}><span style={S.lbl}>일일 가동 시간(h)</span><input value={h} onChange={e=>setH(e.target.value)} type="text" inputMode="decimal" style={ci} placeholder="예: 10"/></div>
<div style={{flex:1}}><span style={S.lbl}>월 가동 일수</span><input value={days} onChange={e=>setDays(e.target.value)} type="text" inputMode="decimal" style={ci} placeholder="예: 26"/></div></div>
<div style={S.row}>
<div style={{flex:1}}><span style={S.lbl}>분사 시간(초)</span><input value={spray} onChange={e=>setSpray(e.target.value)} type="text" inputMode="decimal" style={ci} placeholder="선택"/></div>
<div style={{flex:1}}><span style={S.lbl}>정지 시간(초)</span><input value={stop} onChange={e=>setStop(e.target.value)} type="text" inputMode="decimal" style={ci} placeholder="선택"/></div></div>
<div style={{fontSize:10,color:C.sub,marginTop:2}}>※ 분사·정지를 입력하면 가동률(분사÷(분사+정지))이 반영됩니다. 미입력 시 100%로 계산됩니다.</div>
</div>
<div style={{width:"100%",boxSizing:"border-box",background:est!=null?C.mintD:C.white,borderRadius:12,padding:"16px 18px",marginTop:6,display:"flex",justifyContent:"space-between",alignItems:"center",border:`1px solid ${C.mint}`}}>
<span style={{fontSize:13,color:est!=null?"#fff":C.mintD,fontWeight:800}}>월 예상 소비량</span>
<span style={{fontSize:20,fontWeight:900,color:est!=null?"#fff":C.mintD}}>{est!=null?(Math.round(est*100)/100).toLocaleString()+" ml":"–"}</span></div>
{est==null&&<div style={{fontSize:10.5,color:C.orange,marginTop:8,lineHeight:1.5}}>※ 초당 소비량 · 일일 가동 시간 · 월 가동 일수를 입력하면 자동 계산됩니다.</div>}
<div style={{fontSize:10.5,color:C.sub,marginTop:10,lineHeight:1.7}}>※ 월 예상 소비량 = 초당 소비량 × 일일 가동 시간 × 3600 × 분사÷(분사+정지) × 월 가동 일수</div>
</div>
<Bottom active="consume" nav={nav}/></div>);
}

<SignaturePad label="고객사 담당자가 손으로 서명해 주세요"/>
<button onClick={send} style={{...S.btn(C.blue),marginTop:18,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>💾 저장 및 전송</button>
{sent&&<div style={{...S.card,background:C.greenL,border:`1px solid ${C.green}`,textAlign:"center",padding:16,marginTop:10}}>
<div style={{fontSize:22}}>📧</div>
<div style={{fontWeight:800,color:C.green,marginTop:4}}>저장 및 전송 완료</div>
<div style={{fontSize:12,color:C.sub,marginTop:4}}>{email?"고객용 방문일지를 저장하고 "+email+" 로 전송했습니다.":"저장 완료. 고객사 담당자 이메일이 등록되어 있지 않습니다. (설치 현황에서 등록)"}</div></div>}
</div>
<Bottom active="log" nav={nav}/></div>);
}
// ===== [신규] 고객사 히스토리 · 업체 검색 =====
function VisitHist({nav}){
const[q,setQ]=useState("");
const[sel,setSel]=useState("");
const compSet={};
PARTNERS.forEach(c=>{compSet[c]=1;});
Object.keys(SAVED_VISITS).forEach(c=>{compSet[c]=1;});
Object.keys(INSTALL_DATA).forEach(c=>{compSet[c]=1;});
OP_HISTORY.forEach(e=>{if(e.company)compSet[e.company]=1;});
const comps=Object.keys(compSet).filter(c=>c&&c!=="미지정").sort((a,b)=>a.localeCompare(b,"ko"));
const list=q.trim()?comps.filter(c=>c.includes(q.trim())):comps;
const hist=sel?OP_HISTORY.filter(e=>e.company===sel).map(e=>({date:e.date,title:e.cat,desc:e.text,type:e.cat,lv:e.lv,sev:e.sev,staff:e.staff})):[];
const sv=sel?(SAVED_VISITS[sel]||null):null;
return(<div style={{display:"flex",flexDirection:"column",height:"100%"}}>
<div style={S.top}><button style={S.back} onClick={()=>NAVREF.back()}>‹</button><span style={S.h1}>고객사 히스토리</span></div>
<div style={S.body}>
{!sel?<React.Fragment>
<div style={{display:"flex",alignItems:"center",gap:10,background:C.white,padding:"11px 14px",borderRadius:14,border:`1px solid ${C.line}`,boxShadow:"0 4px 14px rgba(18,48,44,0.06)",marginBottom:12}}>
<span style={{fontSize:15}}>🔍</span><input value={q} onChange={e=>setQ(e.target.value)} placeholder="업체명을 검색하세요." style={{border:"none",outline:"none",background:"none",flex:1,fontSize:14}}/></div>
<div style={{fontSize:12,fontWeight:800,color:C.sub,margin:"0 2px 8px"}}>고객사 선택 <span style={{color:C.blue}}>({list.length})</span></div>
{comps.length===0?<div style={{...S.card,textAlign:"center",color:C.sub,fontSize:13,padding:22}}>등록된 고객사가 없습니다.</div>
:list.length===0?<div style={{...S.card,textAlign:"center",color:C.sub,fontSize:13,padding:22}}>'{q}' 검색 결과가 없습니다.</div>
:list.map(c=>{const v=SAVED_VISITS[c];const hc=OP_HISTORY.filter(e=>e.company===c).length;return(
<div key={c} onClick={()=>{setSel(c);setQ("");}} style={{...S.card,display:"flex",alignItems:"center",gap:12,cursor:"pointer",padding:"14px 15px"}}>
<span style={{width:40,height:40,borderRadius:12,background:C.blueL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,flexShrink:0}}>🏢</span>
<div style={{flex:1,minWidth:0}}><div style={{fontSize:15,fontWeight:800}}>{c}</div>
<div style={{display:"flex",gap:5,marginTop:5,flexWrap:"wrap"}}>
<span style={{fontSize:10,fontWeight:800,color:C.orange,background:C.yellowL,borderRadius:6,padding:"2px 7px"}}>히스토리 {hc}</span>
{v&&v.internal&&<span style={{fontSize:10,fontWeight:800,color:C.mintD,background:C.mintL,borderRadius:6,padding:"2px 7px"}}>내부</span>}
{v&&v.general&&<span style={{fontSize:10,fontWeight:800,color:C.blueD,background:C.blueL,borderRadius:6,padding:"2px 7px"}}>일반</span>}</div></div>
<span style={{color:C.sub,fontSize:18}}>›</span></div>);})}
</React.Fragment>:<React.Fragment>
<div onClick={()=>setSel("")} style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:12,fontWeight:800,color:C.blue,cursor:"pointer",marginBottom:12}}>‹ 다른 고객사 선택</div>
<div style={{...S.card,display:"flex",alignItems:"center",gap:12,padding:"14px 15px",marginBottom:14}}>
<span style={{width:44,height:44,borderRadius:13,background:C.grad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:21,flexShrink:0}}>🏢</span>
<div style={{flex:1,minWidth:0}}><div style={{fontSize:17,fontWeight:900}}>{sel}</div>
<div style={{fontSize:11,color:C.sub,marginTop:2}}>운영 히스토리 {hist.length}건</div></div></div>
{sv&&<div onClick={()=>nav("visitcat",{p:sel})} style={{...S.card,display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"12px 14px",marginBottom:14,background:C.blueL,border:`1px solid ${C.mint}`}}>
<span style={{fontSize:18}}>📂</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:800,color:C.blueD}}>저장된 서방지 보기</div>
<div style={{display:"flex",gap:5,marginTop:4}}>{sv.internal&&<span style={{fontSize:10,fontWeight:800,color:C.mintD,background:C.mintL,borderRadius:6,padding:"2px 7px"}}>내부</span>}{sv.general&&<span style={{fontSize:10,fontWeight:800,color:C.blueD,background:C.white,borderRadius:6,padding:"2px 7px"}}>일반</span>}</div></div>
<span style={{color:C.blue,fontSize:18}}>›</span></div>}
<div style={{...S.card,padding:0,overflow:"hidden"}}>
<div style={{background:C.bg,padding:"12px 14px",fontWeight:800,fontSize:15,textAlign:"center",borderBottom:`1px solid ${C.line}`}}>운영 히스토리</div>
<div style={{padding:"14px"}}>
{hist.length===0?<div style={{textAlign:"center",color:C.sub,fontSize:13,padding:"20px 0"}}>이 고객사의 저장된 히스토리가 없습니다.<br/>서비스 방문일지(내부)·히스토리 작성에서 저장하면 표시됩니다.</div>
:hist.map((l,i)=>{const lv=HIST_LV[l.lv]||HIST_LV[1];return(
<div key={i} style={{display:"flex",gap:10,marginBottom:14}}>
<div style={{width:12,height:12,borderRadius:"50%",background:lv.color,marginTop:4,flexShrink:0}}/>
<div style={{flex:1,background:lv.bg,border:`1px solid ${lv.color}`,borderRadius:10,padding:"11px 13px"}}>
<div style={{fontWeight:700,fontSize:13,color:lv.color}}>{l.date} | {l.title}</div>
<div style={{fontSize:10,fontWeight:700,marginTop:3,color:lv.color}}>{lv.dot} {l.sev} · #{l.type}{l.staff?" · "+l.staff:""}</div>
<div style={{fontSize:12,color:C.sub,marginTop:4,lineHeight:1.5}}>{l.desc}</div></div></div>);})}
</div></div>
</React.Fragment>}
</div>
<Bottom active="home" nav={nav}/></div>);
}
// ===== [신규] 서방지 카테고리 (내부 / 일반) =====
function VisitCat({nav,params}){
const p=params&&params.p?params.p:"";
const v=SAVED_VISITS[p]||{};
const card=(icon,title,sub,grad,sh,active,onClick)=>(
<div onClick={active?onClick:undefined} style={{position:"relative",overflow:"hidden",background:active?grad:"#EDEFF1",borderRadius:20,padding:"20px 18px",marginBottom:14,cursor:active?"pointer":"default",opacity:active?1:0.55,display:"flex",alignItems:"center",gap:14,boxShadow:active?`0 12px 26px ${sh}`:"none"}}>
<div style={{width:48,height:48,borderRadius:14,background:"rgba(255,255,255,0.22)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{icon}</div>
<div style={{flex:1}}><div style={{fontSize:17,fontWeight:800,color:active?"#fff":C.sub}}>{title}</div><div style={{fontSize:11.5,fontWeight:600,color:active?"rgba(255,255,255,0.9)":C.sub,marginTop:3}}>{active?sub:"저장된 기록 없음"}</div></div>
{active&&<span style={{fontSize:22,fontWeight:700,color:"rgba(255,255,255,0.92)"}}>›</span>}</div>);
return(<div style={{display:"flex",flexDirection:"column",height:"100%"}}>
<div style={S.top}><button style={S.back} onClick={()=>NAVREF.back()}>‹</button><span style={S.h1}>서방지 · {p}</span></div>
<div style={S.body}>
<div style={{fontSize:13,color:C.sub,marginBottom:16}}><span style={{color:C.sub}}>업체명 </span><b style={{color:C.ink,fontSize:15}}>{p}</b> · 저장된 서방지</div>
{card("📝","서비스 방문일지(내부)","점검·내부 코멘트 · 상세 기록","linear-gradient(135deg,#14BBAC 0%,#0E9488 100%)","rgba(18,180,166,0.32)",v.internal,()=>nav("visit",{p}))}
{card("📄","서비스 방문일지(일반)","고객 제공용 · 추출본","linear-gradient(135deg,#4A82F0 0%,#2451C7 100%)","rgba(46,111,224,0.32)",v.general,()=>nav("visitgen",{p}))}
</div>
<Bottom active="home" nav={nav}/></div>);
}
const Bottom=({active,nav})=>(<div style={S.bnav}>
{[["home","🏠","홈"],["log","📒","서비스 로그"],["history","🕘","히스토리"],["consume","🧴","향료"],["faq","🛠️","FAQ"]].map(([k,i,l])=>{const a=active===k;return(
<button key={k} onClick={()=>nav(k)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",flex:1,padding:0}}>
<span style={{width:46,height:30,borderRadius:15,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,background:a?C.blueL:"transparent",boxShadow:a?"inset 0 0 0 1px rgba(18,180,166,0.35)":"none"}}>{i}</span>
<span style={{fontSize:9.5,fontWeight:a?800:600,color:a?C.blueD:C.sub,whiteSpace:"nowrap",letterSpacing:"-0.2px"}}>{l}</span></button>);})}</div>);
function App(){
const[unlock,setUnlock]=useState(false);
const[scr,setScr]=useState("signin");
const[params,setParams]=useState({});
const[hist,setHist]=useState([]);
const[inspections,setInspections]=useState([]);
const[surveys,setSurveys]=useState([]);
const store={inspections,surveys,addInspection:(item)=>setInspections(l=>[item,...l]),addSurvey:(item)=>setSurveys(l=>[item,...l])};
const nav=(to,p={})=>{setHist(h=>[...h,{scr,params}]);setScr(to);setParams(p||{});window.scrollTo&&window.scrollTo(0,0);};
const back=()=>{
if(hist.length===0){setUnlock(false);return;} // 로그인 화면에서 뒤로 → 접근 코드 화면
const prev=hist[hist.length-1];
setHist(h=>h.slice(0,-1));setScr(prev.scr);setParams(prev.params||{});
window.scrollTo&&window.scrollTo(0,0);
};
NAVREF.back=back;
const screens={
signin:<SignIn nav={nav}/>,home:<Home nav={nav} store={store}/>,today:<Today nav={nav}/>,log:<Log nav={nav}/>,logmenu:<LogMenu nav={nav} params={params}/>,
install:<Install nav={nav} params={params}/>,visit:<Visit nav={nav} params={params} store={store}/>,customer:<Customer nav={nav} params={params}/>,
consume:<Consume nav={nav}/>,history:<History nav={nav}/>,survey:<Survey nav={nav} store={store}/>,surveymenu:<SurveyMenu nav={nav}/>,scentsurvey:<ScentSurvey nav={nav}/>,installdoc:<InstallDoc nav={nav}/>,seriallist:<SerialList nav={nav}/>,faq:<FAQ nav={nav}/>,profile:<Profile nav={nav}/>,ship:<Ship nav={nav}/>,shipcalc:<ShipCalc nav={nav} params={params}/>,visitgen:<VisitGen nav={nav} params={params}/>,visithist:<VisitHist nav={nav}/>,visitcat:<VisitCat nav={nav} params={params}/>,
};
return(<div style={S.app}><div style={S.phone}>{!unlock?<Gate onOk={()=>setUnlock(true)}/>:(screens[scr]||screens.home)}</div></div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
